<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --g1:#1D4E3A;--g2:#2D6A4F;--g3:#52B788;--g4:#D8F3DC;--g5:#F0FAF4;--g6:#B7E4C7;
  --w:#fff;--gray1:#111;--gray2:#444;--gray3:#888;--gray4:#bbb;--gray5:#e8e8e8;--gray6:#f5f5f5;
  --r:10px;--rs:7px;--sh:0 1px 3px rgba(0,0,0,.05),0 4px 14px rgba(0,0,0,.05);
}
html,body{height:100%;font-family:'Pretendard',sans-serif;font-size:14px;color:var(--gray1);background:#f0f2f0}
a{color:var(--g2);text-decoration:none}a:hover{text-decoration:underline}

/* LAYOUT */
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sb{width:216px;background:var(--g1);display:flex;flex-direction:column;flex-shrink:0}
.sb-logo{padding:18px 16px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo h1{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.2px}
.sb-logo p{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px}
.sb-list{flex:1;overflow-y:auto;padding:8px 7px 12px}
.sb-ttl{font-size:10px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:.06em;padding:10px 9px 4px;text-transform:uppercase}
.sbi{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:var(--rs);cursor:pointer;font-size:12px;color:rgba(255,255,255,.6);transition:all .13s;border:none;background:transparent;width:100%;text-align:left}
.sbi:hover{background:rgba(255,255,255,.09);color:#fff}
.sbi.on{background:rgba(255,255,255,.17);color:#fff;font-weight:700}
.sbi .rn{font-size:13px;font-weight:700;min-width:24px}
.sbi .dt{font-size:10px;color:rgba(255,255,255,.35)}
.sbi .bk{margin-left:auto;font-size:10px;padding:1px 6px;border-radius:8px;background:rgba(255,255,255,.11);color:rgba(255,255,255,.65);flex-shrink:0}
.sbi.on .bk{background:var(--g3);color:var(--g1)}
.sb-add{display:flex;align-items:center;gap:6px;padding:6px 9px;border-radius:var(--rs);cursor:pointer;font-size:11px;color:rgba(255,255,255,.38);border:1px dashed rgba(255,255,255,.16);background:transparent;width:100%;transition:all .15s;margin-top:5px}
.sb-add:hover{color:rgba(255,255,255,.72);border-color:rgba(255,255,255,.34)}
.sb-empty{font-size:12px;color:rgba(255,255,255,.22);text-align:center;padding:32px 10px;line-height:1.8}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* TOP NAV */
.topnav{background:var(--w);border-bottom:1px solid var(--gray5);padding:0 24px;display:flex;align-items:center;flex-shrink:0}
.nav-logo{font-size:13px;font-weight:700;color:var(--g2);margin-right:18px;padding:14px 0}
.mt{padding:13px 15px;font-size:13px;font-weight:600;color:var(--gray3);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;font-family:inherit}
.mt:hover{color:var(--gray1)}
.mt.on{color:var(--g1);border-bottom-color:var(--g1)}
.nav-sep{width:1px;height:20px;background:var(--gray5);margin:0 6px;flex-shrink:0}
.mt.hist{color:#7c3aed}.mt.hist.on{color:#7c3aed;border-bottom-color:#7c3aed}
.nav-act{margin-left:auto;display:flex;gap:8px;align-items:center;padding:8px 0}

/* PAGE */
.page{flex:1;overflow-y:auto;padding:22px 24px}

/* CAMPAIGN SUBTABS */
.stab-wrap{display:flex;gap:6px;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--gray5);align-items:center;flex-wrap:wrap}
.stab{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--gray5);background:var(--w);color:var(--gray3);transition:all .15s;font-family:inherit}
.stab:hover{border-color:var(--gray4);color:var(--gray1)}
.stab.on{background:var(--g1);color:#fff;border-color:var(--g1)}
.stab[data-type="릴스"].on{background:#3730A3;border-color:#3730A3}
.stab[data-type="2차 활용"].on{background:#065F46;border-color:#065F46}
.stab-new{padding:6px 13px;border-radius:20px;font-size:12px;cursor:pointer;border:1.5px dashed var(--gray4);background:transparent;color:var(--gray3);font-family:inherit;transition:all .15s}
.stab-new:hover{border-color:var(--g3);color:var(--g2)}
.camp-count{font-size:10px;padding:1px 5px;border-radius:8px;background:rgba(255,255,255,.3);color:inherit;margin-left:3px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--rs);border:1px solid var(--gray5);background:var(--w);font-size:12px;font-family:inherit;cursor:pointer;color:var(--gray2);font-weight:500;transition:all .14s;line-height:1;white-space:nowrap}
.btn:hover{background:var(--gray6);border-color:var(--gray4)}
.btn.pri{background:var(--g1);color:#fff;border-color:var(--g1)}.btn.pri:hover{background:var(--g2)}
.btn.suc{background:#eaf7ef;color:#1a6b3a;border-color:#a8dab9}.btn.suc:hover{background:#d5f0e3}
.btn.dan{color:#b91c1c;border-color:#fca5a5;background:#fff1f1}.btn.dan:hover{background:#fee2e2}
.btn.sm{padding:4px 9px;font-size:11px}
.btn.ico{padding:6px 8px}
.dw{display:inline-flex;align-items:center;gap:5px}
.dw span{font-size:11px;color:#999}
.dw input[type=date]{padding:4px 8px;border-radius:var(--rs);border:1px solid var(--gray5);font-size:12px;font-family:inherit;color:var(--gray1)}
.dw input[type=date]:focus{outline:none;border-color:var(--g3)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.sc{background:var(--w);border-radius:var(--r);border:1px solid var(--gray5);padding:14px 15px;box-shadow:var(--sh)}
.sc-l{font-size:10px;font-weight:600;color:var(--gray3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px}
.sc-n{font-size:22px;font-weight:700;line-height:1}
.sc-n small{font-size:11px;font-weight:400;color:var(--gray3);margin-left:2px}
.sc-s{font-size:11px;color:var(--gray3);margin-top:3px}

/* TABLE */
.tw{background:var(--w);border-radius:var(--r);border:1px solid var(--gray5);box-shadow:var(--sh);overflow:hidden;margin-bottom:14px}
.tw-h{padding:11px 15px;border-bottom:1px solid var(--gray5);display:flex;align-items:center;gap:8px}
.tw-h h3{font-size:13px;font-weight:700}
.tw-h .sub{font-size:11px;color:var(--gray3)}
.tsc{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:7px 11px;font-size:10px;font-weight:700;color:var(--gray3);border-bottom:1px solid var(--gray5);background:#f9f9f9;letter-spacing:.05em;white-space:nowrap;text-transform:uppercase}
td{padding:8px 11px;border-bottom:1px solid var(--gray5);vertical-align:middle;font-size:12px}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#f8fbf8}
.tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;white-space:nowrap}
.t-dm{background:#EEF2FF;color:#3730A3}
.t-em{background:#FEF3C7;color:#92400E}
.t-ph{background:#FFF4E6;color:#9a3412}
.t-ty{background:var(--g4);color:var(--g1)}
.t-fe{background:#FEE2E2;color:#991B1B}
.nodata{text-align:center;padding:50px;color:var(--gray4);font-size:13px}

/* MONTHLY BLOCKS */
.wblock{background:var(--w);border-radius:var(--r);border:1px solid var(--gray5);box-shadow:var(--sh);overflow:hidden;margin-bottom:12px}
.wb-h{display:flex;align-items:center;gap:9px;padding:11px 15px;background:var(--g5);border-bottom:1px solid var(--g6);cursor:pointer;user-select:none}

.wb-h .rnd{font-size:13px;font-weight:700;color:var(--g1)}
.wb-h .dt{font-size:11px;color:var(--g2)}
.wb-h .bk{margin-left:auto;font-size:11px;padding:2px 7px;border-radius:10px;background:var(--g4);color:var(--g2)}

.dbgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.dc{background:var(--w);border-radius:var(--r);border:1px solid var(--gray5);padding:16px;box-shadow:var(--sh)}
.dc h3{font-size:10px;font-weight:700;color:var(--gray3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:11px}
.ri{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--gray5);cursor:pointer}
.ri:last-child{border-bottom:none}
.ri:hover .rin{color:var(--g2)}
.ri-ico{width:28px;height:28px;border-radius:var(--rs);background:var(--g4);color:var(--g1);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}

.ris{font-size:11px;color:var(--gray3);margin-top:1px}

.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:999;align-items:center;justify-content:center;padding:20px}
.ov.open{display:flex}
.modal{background:var(--w);border-radius:var(--r);width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.18)}
.mh{padding:16px 20px 12px;border-bottom:1px solid var(--gray5);display:flex;align-items:center;justify-content:space-between}
.mh h3{font-size:15px;font-weight:700}
.mb{padding:16px 20px}
.mf{padding:12px 20px;border-top:1px solid var(--gray5);display:flex;justify-content:flex-end;gap:8px}
.fr{margin-bottom:12px}
.fr label{display:block;font-size:11px;font-weight:700;color:var(--gray2);margin-bottom:4px}
.fr input,.fr select,.fr textarea{width:100%;padding:8px 11px;border-radius:var(--rs);border:1px solid var(--gray5);background:var(--w);font-size:13px;color:var(--gray1);font-family:inherit;transition:border .15s}

.fr textarea{resize:vertical;min-height:100px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sec{font-size:10px;font-weight:700;color:var(--g2);letter-spacing:.07em;text-transform:uppercase;padding:5px 0 4px;border-bottom:1px solid var(--g4);margin:12px 0 10px}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--g1);color:#fff;padding:10px 16px;border-radius:var(--r);font-size:13px;font-weight:600;z-index:9999;transform:translateY(60px);opacity:0;transition:all .25s;box-shadow:0 8px 24px rgba(0,0,0,.18)}
.toast.on{transform:translateY(0);opacity:1}

@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gray5);border-radius:3px}
</style>
</head>

const supa = {
  async get(table){
    const res = await fetch(`${SUPA_URL}/rest/v1/${table}?select=*`, {
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
    });
    return res.json();
  },
  async upsert(table, data){
    await fetch(`${SUPA_URL}/rest/v1/${table}`, {
      method:'POST',
      headers:{
        'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,
        'Content-Type':'application/json',
        'Prefer':'resolution=merge-duplicates'
      },
      body: JSON.stringify(data)
    });
  },
  async del(table, id){
    await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`, {
      method:'DELETE',
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
    });
  }
};

async function loadDB(){
  showLoading();
  try{
    const [weekly, monthly, campaigns] = await Promise.all([
      supa.get('weekly'),
      supa.get('monthly'),
      supa.get('campaigns')
    ]);
    if(weekly.length||monthly.length||campaigns.length){
      DB.weekly = weekly.map(w=>({...w, weekIds:w.week_ids||[], people:w.people||[]}));
      DB.monthly = monthly.map(m=>({...m, weekIds:m.week_ids||[], people:m.people||[]}));
      DB.campaigns = campaigns.map(c=>({...c, people:c.people||[]}));
    } else {
      // DB 비어있으면 seed 후 자동 저장
      seed();
      await saveAll();
    }
  }catch(e){

      saveAll().catch(()=>{});

  hideLoading();
  renderSB();
  pgDash();
}

async function save(){
  // 변경된 데이터 Supabase에 저장 (로컬도 백업)
  try{localStorage.setItem('sdmgr14',JSON.stringify(DB));}catch(e){}
  // 비동기로 Supabase 저장 (화면 블로킹 없이)
  saveAll().catch(e=>console.log('저장 오류',e));
}

async function saveAll(){
  const wPromises = DB.weekly.map(w=>
    supa.upsert('weekly',{id:w.id,round:w.round,date:w.date,people:w.people,week_ids:w.weekIds||[]})
  );
  const mPromises = DB.monthly.map(m=>
    supa.upsert('monthly',{id:m.id,month:m.month,note:m.note,week_ids:m.weekIds||[]})
  );
  const cPromises = DB.campaigns.map(c=>
    supa.upsert('campaigns',{id:c.id,name:c.name,type:c.type,round:c.round,date:c.date,people:c.people})
  );
  await Promise.all([...wPromises,...mPromises,...cPromises]);

const e=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const g=id=>(document.getElementById(id)||{}).value||'';
const today=()=>new Date().toISOString().slice(0,10);
const isDM=c=>!c||(c||'').toUpperCase()==='DM';
const normH=s=>(s||'').replace(/[\s\n\r()_\-]/g,'').toLowerCase();
const typeOpts=sel=>['피드','릴스','유튜브','단순 선물','시딩','피드 or 릴스','유튜브 or 피드','기타'].map(t=>`<option${t===sel?' selected':''}>${t}</option>`).join('');
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');setTimeout(()=>el.classList.remove('on'),2400);}

// 캠페인 참여 배지 (핸들 기준)
function campBadges(handle){
  const key=normH(handle);
  return DB.campaigns.filter(c=>c.people.some(p=>normH(p.handle)===key)).map(c=>{
    const col=c.type==='2차 활용'?'background:#D1FAE5;color:#065F46':
              c.type==='릴스'?'background:#EEF2FF;color:#3730A3':'background:#FEF3C7;color:#92400E';
    return`<span style="font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;${col};white-space:nowrap;display:inline-block;margin:1px">${c.name} ${c.round}차</span>`;
  }).join('');
}

// 주간에서 드롭다운으로 캠페인 추가
function addToCamp(handle,campId){
  if(!campId) return;
  const c=DB.campaigns.find(x=>x.id===campId);if(!c)return;
  if(c.people.some(p=>normH(p.handle)===normH(handle))){toast('이미 추가됨');return;}
  let src=null;DB.weekly.forEach(w=>{const f=w.people.find(p=>normH(p.handle)===normH(handle));if(f)src=f;});
  c.people.push({id:'cp'+uid(),handle:src?.handle||handle,url:src?.url||'',followers:src?.followers||0,product:src?.product||'',contact:src?.contact||'',address:src?.address||'',fee:'',note:''});
  save();renderSB();renderPage();toast(`${handle} → ${c.name} ${c.round}차 추가됨`);
}

// ══════════════════════════════
//  NAVIGATION
// ══════════════════════════════
function mainTab(tab){
  if(cur.tab!==tab) cur.id=null;
  cur.tab=tab;
  document.querySelectorAll('.mt').forEach((b,i)=>b.classList.toggle('on',['dash','weekly','monthly','campaign','history'][i]===tab));
  document.getElementById('nav-act').innerHTML='';
  renderSB();
  renderPage();
}

function campSubTab(type){
  cur.campType=type;
  cur.id=null;
  renderSB();
  renderPage();
}

function renderSB(){
  const el=document.getElementById('sb-list'),t=cur.tab;
  let h='';
  if(t==='dash'||t==='history'){
    el.innerHTML=`<div class="sb-empty">위 탭을 눌러<br>목록을 확인하세요</div>`;return;
  }
  if(t==='weekly'){
    // 월별로 그룹핑
    const grouped={};
    DB.weekly.forEach(w=>{
      const ym=w.date.slice(0,7);
      if(!grouped[ym])grouped[ym]=[];
      grouped[ym].push(w);
    });
    Object.keys(grouped).sort().forEach(ym=>{
      const mon=parseInt(ym.slice(5))+'월';
      const weeks=grouped[ym].sort((a,b)=>a.round-b.round);
      h+=`<div class="sb-ttl">${mon}</div>`;
      weeks.forEach((w,idx)=>{
        const done=w.people.filter(p=>p.shipped).length;
        const total=w.people.length;
        const allDone=done===total&&total>0;
        h+=`<button class="sbi${cur.id===w.id?' on':''}" onclick="selW('${w.id}')">
          <span class="rn">${idx+1}차</span>
          <span class="dt">${w.date.slice(5).replace('-','/')}</span>
          <span class="bk" style="${allDone?'background:#52B788;color:#fff':''}">
            ${done>0?done+'/':''}${total}
          </span>
        </button>`;
      });
    });
    h+=`<button class="sb-add" onclick="openAddW()">＋ 새 주간 리스트</button>`;
  } else if(t==='monthly'){
    h+=`<div class="sb-ttl">월간 리스트</div>`;
    [...DB.monthly].sort((a,b)=>b.month.localeCompare(a.month)).forEach(m=>{
      const lbl=m.month.slice(0,4)+'년 '+parseInt(m.month.slice(5))+'월';
      const tot=DB.weekly.filter(w=>m.weekIds.includes(w.id)).reduce((a,w)=>a+w.people.length,0);
      h+=`<button class="sbi${cur.id===m.id?' on':''}" onclick="selM('${m.id}')">
        <span>${lbl}</span><span class="bk">${tot}</span></button>`;
    });
    h+=`<button class="sb-add" onclick="openAddM()">＋ 새 월간 리스트</button>`;
  } else if(t==='campaign'){
    h+=`<div class="sb-ttl">${cur.campType} 캠페인</div>`;
    DB.campaigns.filter(c=>c.type===cur.campType).sort((a,b)=>b.round-a.round).forEach(c=>{
      h+=`<button class="sbi${cur.id===c.id?' on':''}" onclick="selC('${c.id}')">
        <span class="rn">${c.round}차</span><span class="dt">${c.date.slice(5).replace('-','/')}</span>
        <span class="bk">${c.people.length}</span></button>`;
    });
    h+=`<button class="sb-add" onclick="openAddCampRound()">＋ 새 ${cur.campType} 차수</button>`;
  }
  el.innerHTML=h;
}

function selW(id){cur.id=id;cur.tab='weekly';document.querySelectorAll('.mt').forEach((b,i)=>b.classList.toggle('on',i===1));renderSB();renderPage();}
function selM(id){cur.id=id;cur.tab='monthly';document.querySelectorAll('.mt').forEach((b,i)=>b.classList.toggle('on',i===2));renderSB();renderPage();}
function selC(id){
  const c=DB.campaigns.find(x=>x.id===id);
  if(c) cur.campType=c.type;
  cur.id=id;cur.tab='campaign';
  document.querySelectorAll('.mt').forEach((b,i)=>b.classList.toggle('on',i===3));
  renderSB();renderPage();
}

function renderPage(){
  document.getElementById('nav-act').innerHTML='';
  const t=cur.tab;
  if(t==='dash') pgDash();

}

function pgHistory(){
  const prevSearch=document.getElementById('hist-search')?.value||'';

    `<input id="hist-search" type="text" placeholder="이름·핸들 검색..." value="${prevSearch}"

     <button class="btn suc" onclick="expHistory()">⬇ 통합 엑셀</button>`;
  const map={};
  DB.weekly.forEach(w=>w.people.forEach(p=>{const k=normH(p.handle);if(!map[k])map[k]={handle:p.handle,followers:p.followers,seedings:[],camps:[]};map[k].seedings.push({round:w.round,date:w.date,product:p.product,monthRound:getMonthRound(w.id)});}));
  DB.campaigns.forEach(c=>c.people.forEach(p=>{const k=normH(p.handle);if(!map[k])map[k]={handle:p.handle,followers:p.followers,seedings:[],camps:[]};map[k].camps.push({name:c.name,type:c.type,round:c.round,product:p.product,fee:p.fee,note:p.note});}));
  const search=(document.getElementById('hist-search')?.value||prevSearch).trim().toLowerCase();
  let entries=Object.values(map).filter(x=>!search||normH(x.handle).includes(search.replace(/\s/g,'')));
  entries.sort((a,b)=>(b.camps.length>0?1:0)-(a.camps.length>0?1:0)||(Math.max(0,...b.seedings.map(s=>s.round))-Math.max(0,...a.seedings.map(s=>s.round))));

  };
  document.getElementById('page').innerHTML=`
  <div class="stats">
    <div class="sc"><div class="sc-l">총 인물</div><div class="sc-n">${entries.length}<small>명</small></div></div>
    <div class="sc"><div class="sc-l">시딩+캠페인</div><div class="sc-n">${entries.filter(x=>x.camps.length>0&&x.seedings.length>0).length}<small>명</small></div></div>
    <div class="sc"><div class="sc-l">시딩 2회+</div><div class="sc-n">${entries.filter(x=>x.seedings.length>1).length}<small>명</small></div></div>
    <div class="sc"><div class="sc-l">캠페인 전용</div><div class="sc-n">${entries.filter(x=>x.camps.length>0&&x.seedings.length===0).length}<small>명</small></div></div>
  </div>
  <div class="tw">
    <div class="tw-h"><h3>인물별 진행 이력</h3><span class="sub">${entries.length}명${search?' (검색결과)':''} · 시딩+캠페인 참여자 먼저</span></div>
    <div class="tsc"><table>
      <thead><tr><th>#</th><th>활동명</th><th>팔로워</th><th>상태</th><th>시딩 차수</th><th>시딩 제품</th><th>캠페인</th><th>캠페인 제품</th><th>비용</th></tr></thead>
      <tbody>${entries.length===0?`<tr><td colspan="9" class="nodata">검색 결과 없음</td></tr>`:
        entries.map((x,i)=>`<tr style="${x.camps.length>0&&x.seedings.length>0?'background:#FAFAFF':''}">
          <td style="color:#ccc">${i+1}</td>
          <td style="font-weight:700">${e(x.handle)}</td>
          <td style="font-size:11px">${x.followers?x.followers.toLocaleString():'-'}</td>
          <td>${statusBadge(x)}</td>
          <td style="font-size:11px;color:var(--g2);font-weight:600">${x.seedings.map(s=>s.monthRound||s.round+'차').join(', ')||'-'}</td>
          <td style="font-size:11px;max-width:140px">${[...new Set(x.seedings.map(s=>s.product).filter(Boolean))].join('<br>')||'-'}</td>
          <td style="font-size:11px">${x.camps.map(c=>`<span style="font-size:10px;padding:1px 6px;border-radius:4px;${c.type==='2차 활용'?'background:#D1FAE5;color:#065F46':'background:#EEF2FF;color:#3730A3'}">${c.name} ${c.round}차</span>`).join(' ')||'-'}</td>
          <td style="font-size:11px;max-width:140px">${[...new Set(x.camps.map(c=>c.product).filter(Boolean))].join('<br>')||'-'}</td>
          <td style="font-size:11px">${x.camps.map(c=>c.fee).filter(Boolean).join(', ')||'-'}</td>
        </tr>`).join('')}
      </tbody>
    </table></div>
  </div>`;
}

    <button class="btn" onclick="cm()">취소</button>
    <button class="btn pri" id="paste-save-btn" onclick="savePaste('${wid}')" disabled>저장</button>
  </div>`);

function previewPaste(){
  const raw=document.getElementById('paste-input').value.trim();
  const preview=document.getElementById('paste-preview');
  const countEl=document.getElementById('paste-count');
  const saveBtn=document.getElementById('paste-save-btn');
  if(!raw){preview.innerHTML='';countEl.textContent='';saveBtn.disabled=true;_parsed=[];return;}
  const lines=raw.split('\n').map(l=>l.trim()).filter(l=>l);
  _parsed=[];
  let html=`<div style="margin-top:12px;border-radius:7px;overflow:hidden;border:1px solid #e8e8e8">
    <div style="display:grid;grid-template-columns:1.2fr 1.4fr .7fr 1.2fr .8fr;background:#f9f9f9;font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.04em">
      <div style="padding:6px 10px">활동명</div><div style="padding:6px 10px">URL</div><div style="padding:6px 10px">팔로워</div><div style="padding:6px 10px">제품</div><div style="padding:6px 10px">연락처</div>
    </div>`;
  lines.forEach(line=>{
    let cols=line.split('\t');
    if(cols.length<3) cols=line.split(/\s{2,}/);
    const handle=(cols[0]||'').trim(),url=(cols[1]||'').trim();
    const followers=parseInt((cols[2]||'').replace(/[,\s]/g,''))||0;
    const product=(cols[3]||'').trim(),contact=(cols[4]||'').trim();
    const address=(cols[5]||'').trim(),note=(cols[6]||'').trim();
    const ok=handle&&product;
    if(ok) _parsed.push({handle,url,followers,product,product2:'',contact,address,type:'시딩',note});
    html+=`<div style="display:grid;grid-template-columns:1.2fr 1.4fr .7fr 1.2fr .8fr;border-top:1px solid #e8e8e8;font-size:11px;${ok?'':'background:#fff5f5'}">
      <div style="padding:6px 10px;${!handle?'color:#e00;font-weight:600':''}">${handle||'❌'}</div>
      <div style="padding:6px 10px">${url.slice(0,24)||'-'}</div>
      <div style="padding:6px 10px">${followers?followers.toLocaleString():'-'}</div>
      <div style="padding:6px 10px;${!product?'color:#e00;font-weight:600':''}">${product||'❌'}</div>
      <div style="padding:6px 10px">${contact||'-'}</div>
    </div>`;
  });
  html+='</div>';
  preview.innerHTML=html;
  countEl.textContent=`${_parsed.length}명 인식됨`;
  saveBtn.disabled=_parsed.length===0;
}
function savePaste(wid){
  const w=DB.weekly.find(x=>x.id===wid);if(!w||!_parsed.length)return;
  _parsed.forEach(px=>w.people.push({id:'p'+uid(),...px}));
  save();renderSB();renderPage();cm();toast(`${_parsed.length}명 추가됨`);_parsed=[];
}

function getMonthRound(wid){
  const w=DB.weekly.find(x=>x.id===wid);if(!w)return w?.round;
  const ym=w.date.slice(0,7);
  const sameMonth=[...DB.weekly].filter(x=>x.date.slice(0,7)===ym).sort((a,b)=>a.round-b.round);
  const idx=sameMonth.findIndex(x=>x.id===wid);
  const mon=parseInt(ym.slice(5))+'월';
  return `${mon} ${idx+1}차`;
}

  const map={};
  DB.weekly.forEach(w=>w.people.forEach(p=>{
    const k=normH(p.handle);
    if(!map[k])map[k]={handle:p.handle,followers:p.followers,seedings:[],camps:[]};
    map[k].seedings.push({round:w.round,product:p.product});
  }));
  DB.campaigns.forEach(c=>c.people.forEach(p=>{
    const k=normH(p.handle);
    if(!map[k])map[k]={handle:p.handle,followers:p.followers,seedings:[],camps:[]};
    map[k].camps.push({name:c.name,type:c.type,round:c.round,product:p.product,fee:p.fee});
  }));
  const entries=Object.values(map).sort((a,b)=>(b.camps.length>0?1:0)-(a.camps.length>0?1:0));
  const wb=XLSX.utils.book_new();
  const rows1=[['인물별 시딩·캠페인 진행 이력','','','','','','',''],['','','','','','','',''],
    ['#','활동명','팔로워','상태','시딩 차수','시딩 제품','캠페인','비용']];
  entries.forEach((x,i)=>rows1.push([i+1,x.handle,x.followers||'',
    x.camps.length>0&&x.seedings.length>0?'시딩+캠페인':x.camps.length>0?'캠페인만':'시딩',
    x.seedings.map(s=>s.monthRound||s.round+'차').join(', ')||'-',
    [...new Set(x.seedings.map(s=>s.product).filter(Boolean))].join(' / ')||'-',
    x.camps.map(c=>c.name+' '+c.round+'차').join(', ')||'-',
    x.camps.map(c=>c.fee).filter(Boolean).join(', ')||'-']));
  const ws1=XLSX.utils.aoa_to_sheet(rows1);
  ws1['!cols']=[{wch:4},{wch:20},{wch:10},{wch:12},{wch:14},{wch:36},{wch:24},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws1,'인물별 진행이력');
  const dual=entries.filter(x=>x.camps.length>0&&x.seedings.length>0);
  const rows2=[['시딩 → 캠페인 전환 인원','','','',''],['','','','',''],['활동명','팔로워','시딩 차수','캠페인','비용']];
  dual.forEach(x=>rows2.push([x.handle,x.followers||'',x.seedings.map(s=>s.round+'차').join(', '),x.camps.map(c=>c.name+' '+c.round+'차').join(', '),x.camps.map(c=>c.fee).filter(Boolean).join(', ')||'-']));
  const ws2=XLSX.utils.aoa_to_sheet(rows2);
  ws2['!cols']=[{wch:20},{wch:10},{wch:14},{wch:24},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws2,'시딩→캠페인 전환');
  XLSX.writeFile(wb,`시딩_캠페인_진행이력_${today()}.xlsx`);
  toast('통합 엑셀 다운로드 완료');
}


// ══════════════════════════════
//  백업 / 복원
// ══════════════════════════════
function backupData(){
  const data=JSON.stringify(DB,null,2);
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const date=new Date().toISOString().slice(0,10);
  a.href=url;
  a.download=`시딩매니저_백업_${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('백업 파일 저장 완료 💾');
}

function restoreData(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      // 유효성 확인
      if(!data.weekly||!data.monthly||!data.campaigns){
        alert('올바른 백업 파일이 아닙니다.');return;
      }
      if(!confirm(`백업 파일을 불러올까요?\n현재 데이터는 백업 데이터로 교체됩니다.\n\n주간: ${data.weekly.length}차 / 캠페인: ${data.campaigns.length}개`))return;
      DB=data;
      save();
      cur={tab:'dash',campType:'릴스',id:null};
      renderSB();
      pgDash();
      toast('백업 데이터 복원 완료 ✅');
    }catch(err){
      alert('파일을 읽는 중 오류가 발생했습니다.');
    }
  };
  reader.readAsText(file);
  input.value=''; // 같은 파일 다시 선택 가능하도록 초기화
}

// ══════════════════════════════
//  INIT
// ══════════════════════════════
async function resetData(){
  if(!confirm('⚠️ 모든 데이터를 기본값(엑셀 원본)으로 초기화할까요?\n직접 추가/수정한 내용은 모두 사라집니다.')) return;
  try{localStorage.removeItem('sdmgr14');}catch(e){}
  seed();
  toast('Supabase에 저장 중...');
  await saveAll();
  cur={tab:'dash',campType:'릴스',id:null};
  renderSB();
  pgDash();
  toast('데이터 초기화 및 저장 완료 ✅');
}

showLoading();
loadDB();
