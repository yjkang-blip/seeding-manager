@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --g1:#1D4E3A;--g2:#2D6A4F;--g3:#52B788;--g4:#D8F3DC;--g5:#F0FAF4;--g6:#B7E4C7;

}
html,body{height:100%;font-family:'Pretendard',sans-serif;font-size:14px;color:var(--gray1);background:#f0f2f0}
a{color:var(--g2);text-decoration:none}a:hover{text-decoration:underline}

.sb{width:216px;background:var(--g1);display:flex;flex-direction:column;flex-shrink:0}
.sb-logo{padding:18px 16px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo h1{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.2px}
.sb-logo p{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px}
.sb-list{flex:1;overflow-y:auto;padding:8px 7px 12px}
.sb-ttl{font-size:10px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:.06em;padding:10px 9px 4px;text-transform:uppercase}
.sbi{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:var(--rs);cursor:pointer;font-size:12px;color:rgba(255,255,255,.6);transition:all .13s;border:none;background:transparent;width:100%;text-align:left}
.sbi:hover{background:rgba(255,255,255,.09);color:#fff}
.sbi.on{background:rgba(255,255,255,.17);color:#fff;font-weight:700}
.sbi .rn{font-size:13px;font-weight:700;min-width:24px}
.sbi .dt{font-size:10px;color:rgba(255,255,255,.35)}
.sbi .bk{margin-left:auto;font-size:10px;padding:1px 6px;border-radius:8px;background:rgba(255,255,255,.11);color:rgba(255,255,255,.65);flex-shrink:0}
.sbi.on .bk{background:var(--g3);color:var(--g1)}
.sb-add{display:flex;align-items:center;gap:6px;padding:6px 9px;border-radius:var(--rs);cursor:pointer;font-size:11px;color:rgba(255,255,255,.38);border:1px dashed rgba(255,255,255,.16);background:transparent;width:100%;transition:all .15s;margin-top:5px}
.sb-add:hover{color:rgba(255,255,255,.72);border-color:rgba(255,255,255,.34)}
.sb-empty{font-size:12px;color:rgba(255,255,255,.22);text-align:center;padding:32px 10px;line-height:1.8}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

.topnav{background:var(--w);border-bottom:1px solid var(--gray5);padding:0 24px;display:flex;align-items:center;flex-shrink:0}
.nav-logo{font-size:13px;font-weight:700;color:var(--g2);margin-right:18px;padding:14px 0}
.mt{padding:13px 15px;font-size:13px;font-weight:600;color:var(--gray3);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;font-family:inherit}
.mt:hover{color:var(--gray1)}
.mt.on{color:var(--g1);border-bottom-color:var(--g1)}
.nav-sep{width:1px;height:20px;background:var(--gray5);margin:0 6px;flex-shrink:0}
.mt.hist{color:#7c3aed}
.mt.cost{color:#b45309}.mt.cost.on{color:#b45309;border-bottom-color:#b45309}.mt.hist.on{color:#7c3aed;border-bottom-color:#7c3aed}
.nav-act{margin-left:auto;display:flex;gap:8px;align-items:center;padding:8px 0}

/* PAGE */
.page{flex:1;overflow-y:auto;padding:22px 24px}

.stab{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--gray5);background:var(--w);color:var(--gray3);transition:all .15s;font-family:inherit}
.stab:hover{border-color:var(--gray4);color:var(--gray1)}
.stab.on{background:var(--g1);color:#fff;border-color:var(--g1)}

.stab[data-type="2차 활용"].on{background:#065F46;border-color:#065F46}
.stab-new{padding:6px 13px;border-radius:20px;font-size:12px;cursor:pointer;border:1.5px dashed var(--gray4);background:transparent;color:var(--gray3);font-family:inherit;transition:all .15s}
.stab-new:hover{border-color:var(--g3);color:var(--g2)}
.camp-count{font-size:10px;padding:1px 5px;border-radius:8px;background:rgba(255,255,255,.3);color:inherit;margin-left:3px}

.btn.ico{padding:6px 8px}
.dw{display:inline-flex;align-items:center;gap:5px}
.dw span{font-size:11px;color:#999}
.dw input[type=date]{padding:4px 8px;border-radius:var(--rs);border:1px solid var(--gray5);font-size:12px;font-family:inherit;color:var(--gray1)}
.dw input[type=date]:focus{outline:none;border-color:var(--g3)}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.sc{background:var(--w);border-radius:var(--r);border:1px solid var(--gray5);padding:14px 15px;box-shadow:var(--sh)}
.sc-l{font-size:10px;font-weight:600;color:var(--gray3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px}
.sc-n{font-size:22px;font-weight:700;line-height:1}
.sc-n small{font-size:11px;font-weight:400;color:var(--gray3);margin-left:2px}
.sc-s{font-size:11px;color:var(--gray3);margin-top:3px}

.tw-h h3{font-size:13px;font-weight:700}
.tw-h .sub{font-size:11px;color:var(--gray3)}
.tsc{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:7px 11px;font-size:10px;font-weight:700;color:var(--gray3);border-bottom:1px solid var(--gray5);background:#f9f9f9;letter-spacing:.05em;white-space:nowrap;text-transform:uppercase}
td{padding:8px 11px;border-bottom:1px solid var(--gray5);vertical-align:middle;font-size:12px}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#f8fbf8}
.tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;white-space:nowrap}
.t-dm{background:#EEF2FF;color:#3730A3}
.t-em{background:#FEF3C7;color:#92400E}
.t-ph{background:#FFF4E6;color:#9a3412}
.t-ty{background:var(--g4);color:var(--g1)}
.t-fe{background:#FEE2E2;color:#991B1B}
.t-zvzo{background:#EDE9FE;color:#5B21B6}
.t-branderz{background:#FEF3C7;color:#92400E}
.nodata{text-align:center;padding:50px;color:var(--gray4);font-size:13px}

.wb-h{display:flex;align-items:center;gap:9px;padding:11px 15px;background:var(--g5);border-bottom:1px solid var(--g6);cursor:pointer;user-select:none}

.wb-h .arr{font-size:12px;color:var(--g2);transition:transform .2s;margin-left:4px}

.dc{background:var(--w);border-radius:var(--r);border:1px solid var(--gray5);padding:16px;box-shadow:var(--sh)}
.dc h3{font-size:10px;font-weight:700;color:var(--gray3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:11px}

.mb{padding:16px 20px}

.fr{margin-bottom:12px}
.fr label{display:block;font-size:11px;font-weight:700;color:var(--gray2);margin-bottom:4px}
.fr input,.fr select,.fr textarea{width:100%;padding:8px 11px;border-radius:var(--rs);border:1px solid var(--gray5);background:var(--w);font-size:13px;color:var(--gray1);font-family:inherit;transition:border .15s}

.sec{font-size:10px;font-weight:700;color:var(--g2);letter-spacing:.07em;text-transform:uppercase;padding:5px 0 4px;border-bottom:1px solid var(--g4);margin:12px 0 10px}

.toast{position:fixed;bottom:20px;right:20px;background:var(--g1);color:#fff;padding:10px 16px;border-radius:var(--r);font-size:13px;font-weight:600;z-index:9999;transform:translateY(60px);opacity:0;transition:all .25s;box-shadow:0 8px 24px rgba(0,0,0,.18)}
.toast.on{transform:translateY(0);opacity:1}

@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gray5);border-radius:3px}
</style>
</head>

const e=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const g=id=>(document.getElementById(id)||{}).value||'';
const today=()=>new Date().toISOString().slice(0,10);
const isDM=c=>!c||(c||'').toUpperCase()==='DM';
const normH=s=>(s||'').replace(/[\s\n\r()_\-]/g,'').toLowerCase();
const typeTag=t=>{
  const cls=t==='zvzo 협업'?'t-zvzo':t==='브랜더진 협업'?'t-branderz':'t-ty';
  return '<span class="tag '+cls+'">'+(t||'-')+'</span>';
};
const typeOpts=sel=>['피드','릴스','유튜브','단순 선물','시딩','피드 or 릴스','유튜브 or 피드','zvzo 협업','브랜더진 협업','기타'].map(t=>`<option${t===sel?' selected':''}>${t}</option>`).join('');
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');setTimeout(()=>el.classList.remove('on'),2400);}

// 캠페인 참여 배지 (핸들 기준)
function campBadges(handle){
  const key=normH(handle);
  const campBadgeHtml=DB.campaigns.filter(c=>c.people.some(p=>normH(p.handle)===key)).map(c=>{
    const col=c.type==='2차 활용'?'background:#D1FAE5;color:#065F46':
              c.type==='릴스'?'background:#EEF2FF;color:#3730A3':
              c.type==='zvzo 협업'?'background:#EDE9FE;color:#5B21B6':
              c.type==='브랜더진 협업'?'background:#FEF3C7;color:#92400E':
              c.type==='브랜디드'?'background:#FEE2E2;color:#991B1B':
              c.type==='유튜브'?'background:#FEF9C3;color:#854D0E':
              'background:#F1F5F9;color:#475569';
    return`<span style="font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;${col};white-space:nowrap;display:inline-block;margin:1px">${c.name} ${c.round}차</span>`;
  }).join('');
  // collab 딱지
  const collabBadgeHtml=DB.weekly.flatMap(w=>w.people).filter(p=>normH(p.handle)===key&&(p.collabTags||[]).length)
    .flatMap(p=>p.collabTags||[]).filter((v,i,a)=>a.indexOf(v)===i)
    .map(b=>'<span style="font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;background:#EDE9FE;color:#5B21B6;white-space:nowrap;display:inline-block;margin:1px">'+b+' 협업</span>')
    .join('');
  return campBadgeHtml+collabBadgeHtml||'';
}

// 주간에서 드롭다운으로 캠페인 추가
function addToCampOrCollab(handle,val){
  if(!val) return;
  if(val.startsWith('collab:')){
    const brand=val.replace('collab:','');
    // 주간 인원에 협업 딱지 추가 (campaigns 연결과 별도)
    DB.weekly.forEach(function(w){
      w.people.forEach(function(p){
        if(normH(p.handle)===normH(handle)){
          if(!p.collabTags) p.collabTags=[];
          if(!p.collabTags.includes(brand)) p.collabTags.push(brand);
        }
      });
    });
    save();renderSB();renderPage();toast(handle+' → '+brand+' 협업 딱지 추가됨');
  } else {
    addToCamp(handle,val);
  }
}

function addToCamp(handle,campId){
  if(!campId) return;
  const c=DB.campaigns.find(x=>x.id===campId);if(!c)return;
  if(c.people.some(p=>normH(p.handle)===normH(handle))){toast('이미 추가됨');return;}
  let src=null;DB.weekly.forEach(w=>{const f=w.people.find(p=>normH(p.handle)===normH(handle));if(f)src=f;});
  c.people.push({id:'cp'+uid(),handle:src?.handle||handle,url:src?.url||'',followers:src?.followers||0,product:src?.product||'',contact:src?.contact||'',address:src?.address||'',fee:'',note:''});
  save();renderSB();renderPage();toast(`${handle} → ${c.name} ${c.round}차 추가됨`);
}

function mainTab(tab){if(_isDragging)return;
  if(cur.tab!==tab) cur.id=null;
  cur.tab=tab;
  document.querySelectorAll('.mt').forEach((b,i)=>b.classList.toggle('on',['dash','weekly','monthly','campaign','exposure','cost','history'][i]===tab));
  document.getElementById('nav-act').innerHTML='';
  renderSB();
  renderPage();
}

function campSubTab(type){
  cur.campType=type;
  cur.id=null;
  renderSB();
  renderPage();
}

function renderSB(){
  const el=document.getElementById('sb-list'),t=cur.tab;
  let h='';
  if(t==='dash'||t==='history'){
    el.innerHTML=`<div class="sb-empty">위 탭을 눌러<br>목록을 확인하세요</div>`;return;
  }
  if(t==='exposure'){
    if(!DB.exposure||DB.exposure.length===0){
      el.innerHTML=`<div class="sb-empty">보고서를 추가하세요</div>`;return;
    }
    const grouped={};
    DB.exposure.forEach(r=>{
      const month=r.dateStart?r.dateStart.slice(0,7):(r.date?r.date.slice(0,7):'기타');
      if(!grouped[month]) grouped[month]=[];
      grouped[month].push(r);
    });
    h=Object.keys(grouped).sort((a,b)=>b.localeCompare(a)).map(month=>{
      const label=month.includes('-')?`${parseInt(month.split('-')[1])}월`:month;
      const items=grouped[month].map(r=>{
        const dateLabel=r.dateStart&&r.dateEnd?`${r.dateStart.slice(5).replace('-','/')} ~ ${r.dateEnd.slice(5).replace('-','/')}`:r.date||'';
        return `<button class="sbi${cur.id===r.id?' on':''}" onclick="if(_isDragging)return;cur.id='${r.id}';renderSB();renderPage()">
          <span style="display:block;font-weight:600">${e(r.title)}</span>
          <span style="display:block;font-size:10px;opacity:.7;margin-top:1px">${dateLabel}</span>
        </button>`;
      }).join('');
      return `<div class="sb-tt" style="color:#fff;opacity:.5">${label}</div>${items}`;
    }).join('');
    el.innerHTML=h;return;
  }
  if(t==='weekly'){
    // 월별로 그룹핑
    const grouped={};
    DB.weekly.forEach(w=>{
      const ym=w.date.slice(0,7);
      if(!grouped[ym])grouped[ym]=[];
      grouped[ym].push(w);
    });
    Object.keys(grouped).sort().forEach(ym=>{
      const mon=parseInt(ym.slice(5))+'월';
      const weeks=grouped[ym].sort((a,b)=>a.round-b.round);
      h+=`<div class="sb-ttl">${mon}</div>`;
      weeks.forEach((w,idx)=>{
        const done=w.people.filter(p=>p.shipped).length;
        const total=w.people.length;
        const allDone=done===total&&total>0;
        h+=`<button class="sbi${cur.id===w.id?' on':''}" onclick="selW('${w.id}')">
          <span class="rn">${idx+1}차</span>
          <span class="dt">${w.date.slice(5).replace('-','/')}</span>
          <span class="bk" style="${allDone?'background:#52B788;color:#fff':''}">
            ${done>0?done+'/':''}${total}
          </span>
        </button>`;
      });
    });
    h+=`<button class="sb-add" onclick="openAddW()">＋ 새 주간 리스트</button>`;
  } else if(t==='monthly'){
    h+=`<div class="sb-ttl">월간 리스트</div>`;
    [...DB.monthly].sort((a,b)=>b.month.localeCompare(a.month)).forEach(m=>{
      const lbl=m.month.slice(0,4)+'년 '+parseInt(m.month.slice(5))+'월';
      const tot=DB.weekly.filter(w=>m.weekIds.includes(w.id)).reduce((a,w)=>a+w.people.length,0);
      h+=`<button class="sbi${cur.id===m.id?' on':''}" onclick="selM('${m.id}')">
        <span>${lbl}</span><span class="bk">${tot}</span></button>`;
    });
    h+=`<button class="sb-add" onclick="openAddM()">＋ 새 월간 리스트</button>`;
  } else if(t==='campaign'){
    h+=`<div class="sb-ttl">${cur.campType} 캠페인</div>`;
    DB.campaigns.filter(c=>c.type===cur.campType).sort((a,b)=>b.round-a.round).forEach(c=>{
      h+=`<button class="sbi${cur.id===c.id?' on':''}" onclick="selC('${c.id}')">
        <span class="rn">${c.round}차</span><span class="dt">${c.date.slice(5).replace('-','/')}</span>
        <span class="bk">${c.people.length}</span></button>`;
    });
    h+=`<button class="sb-add" onclick="openAddCampRound()">＋ 새 ${cur.campType} 차수</button>`;
  }
  el.innerHTML=h;
}

function selW(id){if(_isDragging)return;cur.id=id;cur.tab='weekly';document.querySelectorAll('.mt').forEach((b,i)=>b.classList.toggle('on',i===1));renderSB();renderPage();}
function selM(id){if(_isDragging)return;cur.id=id;cur.tab='monthly';document.querySelectorAll('.mt').forEach((b,i)=>b.classList.toggle('on',i===2));renderSB();renderPage();}
function selC(id){if(_isDragging)return;
  const c=DB.campaigns.find(x=>x.id===id);
  if(c) cur.campType=c.type;
  cur.id=id;cur.tab='campaign';
  document.querySelectorAll('.mt').forEach((b,i)=>b.classList.toggle('on',i===3));
  renderSB();renderPage();
}

// ── 현물 정산 ──
const COST_AUTO_CATS=[
  {key:'네이버 브랜드 커넥트', fn:(t,m)=>/네이버 브랜드 커넥트/.test(m)},
  {key:'무신사', fn:(t,m)=>/무신사/.test(m)},
  {key:'zvzo', fn:(t,m)=>/zvzo/i.test(m)},
  {key:'브랜더진', fn:(t,m)=>/브랜더진/.test(m)},
  {key:'거래처증정', fn:(t,m)=>/거래처증정/.test(t)||/거래처증정/.test(m)},
  {key:'이벤트/체험단', fn:(t,m)=>/이벤트 증정/.test(t)||/카카오/.test(m)},
  {key:'샘플', fn:(t,m)=>/샘플/.test(t)||/샘플/.test(m)},
  {key:'시딩', fn:(t,m)=>(/시딩|뉴탱글|다나야드/.test(m))&&!(/무신사|브랜더진/.test(m))},
];
const COST_EXCL=['거래처증정','이벤트/체험단','샘플'];
const COST_ORDER=['시딩','네이버 브랜드 커넥트','무신사','zvzo','브랜더진'];
let _costView='list';
let _costCalY=new Date().getFullYear();
let _costSelMonth=null;

function fmtW(n){return Math.round(n).toLocaleString('ko-KR');}
function fmtC(n){return fmtW(n)+'원';}

function pgCost(){

    <div style="display:flex;gap:6px;align-items:center">

        <button onclick="setCostView('list')" style="padding:5px 14px;font-size:12px;font-weight:600;border:none;cursor:pointer;font-family:inherit;background:${_costView==='list'?'#1D4E3A':'transparent'};color:${_costView==='list'?'#fff':'#888'}">목록</button>
        <button onclick="setCostView('cal')" style="padding:5px 14px;font-size:12px;font-weight:600;border:none;cursor:pointer;font-family:inherit;background:${_costView==='cal'?'#1D4E3A':'transparent'};color:${_costView==='cal'?'#fff':'#888'}">달력</button>
      </div>
      <button class="btn pri" onclick="costAddMonth()" style="font-size:12px">＋ 월 추가</button>
    </div>`;
  if(_costView==='list') pgCostList();
  else pgCostCal();

function setCostView(v){_costView=v;pgCost();}

function costGrouped(md){
  const grouped={};
  (md.rows||[]).forEach(r=>{
    if(!grouped[r.cat]) grouped[r.cat]={qty:0,cost:0,memos:[]};
    grouped[r.cat].qty+=r.qty||0;
    grouped[r.cat].cost+=r.cost||0;
    if(r.memo) grouped[r.cat].memos.push({memo:r.memo,qty:r.qty,cost:r.cost});
  });
  return grouped;
}

function costCalc(md){
  const g=costGrouped(md);
  const ov=md.overrides||{};
  const allCats=[...new Set([...COST_ORDER,...Object.keys(g)])].filter(k=>!COST_EXCL.includes(k));
  let totalQty=0,totalEx=0;
  allCats.forEach(k=>{
    const qty=ov[k]?.qty!=null?ov[k].qty:(g[k]?.qty||0);
    const cost=ov[k]?.cost!=null?ov[k].cost:(g[k]?.cost||0);
    totalQty+=qty; totalEx+=cost;
  });
  const extraEx=(md.extra||[]).reduce((s,e)=>s+(e.vatEx||0),0);
  const extraInc=(md.extra||[]).reduce((s,e)=>s+(e.vatInc||0),0);
  return {g,ov,allCats,totalQty,totalPeople:md.people||0,totalEx,extraEx,extraInc,grandEx:totalEx+extraEx,grandInc:totalEx*1.1+extraInc};
}

    <button onclick="_costCalY--;pgCostCal();" style="background:none;border:1px solid #e8e8e8;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:14px">‹</button>

    card.style.cssText=`background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:14px 16px;min-height:120px;cursor:${md?'pointer':'default'};transition:background .12s`;
    if(md){card.onmouseover=()=>card.style.background='#f8fbf8';card.onmouseout=()=>card.style.background='#fff';card.onclick=()=>costOpenMonth(monthStr);}
    if(md){
      const c=costCalc(md);
      const bars=COST_ORDER.filter(k=>(c.ov[k]?.qty!=null?c.ov[k].qty:(c.g[k]?.qty||0))>0).slice(0,4);
      card.innerHTML=`
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <span style="font-size:13px;font-weight:700">${MNAMES[mi]}</span>

function _costRefreshTTL(md){
  const c=costCalc(md);
  const ids={
    'cm-total-qty':fmtW(c.totalQty)+'개',
    'cm-sub-qty':fmtW(c.totalQty)+'개',
    'cm-sub-ex':fmtC(c.totalEx),
    'cm-grand-ex':fmtC(c.grandEx),
    'cm-grand-inc':fmtC(c.grandInc),
    'cm-ttl-qty':fmtW(c.totalQty)+'개',
    'cm-ttl-ex':fmtC(c.grandEx),
    'cm-ttl-inc':fmtC(c.grandInc),
  };
  Object.entries(ids).forEach(([id,val])=>{const el=document.getElementById(id);if(el)el.textContent=val;});
}

function costSetPeople(month,val){
  const md=DB.cost.find(x=>x.month===month);if(!md)return;
  md.people=parseInt(val)||0;costSave();
}

function costSetOverride(month,cat,field,val){
  const md=DB.cost.find(x=>x.month===month);if(!md)return;
  if(!md.overrides)md.overrides={};
  if(!md.overrides[cat])md.overrides[cat]={};
  md.overrides[cat][field]=parseInt(val)||0;
  costSave();
  _costRefreshTTL(md);
  if(field==='cost'){
    const safeKey=cat.replace(/[^a-zA-Z0-9가-힣]/g,'_');
    const el=document.getElementById('vat-'+safeKey);
    if(el)el.textContent=parseInt(val)?fmtC(parseInt(val)*1.1):'-';
  }
}

function costAddCatRow(month){
  const cat=prompt('채널명 입력');if(!cat||!cat.trim())return;
  const md=DB.cost.find(x=>x.month===month);if(!md)return;
  if(!md.overrides)md.overrides={};
  md.overrides[cat.trim()]={qty:0,cost:0};
  costSave();_renderCostModal(md);
}

function costRemoveCat(month,cat){
  const md=DB.cost.find(x=>x.month===month);if(!md)return;
  md.rows=(md.rows||[]).filter(r=>r.cat!==cat);
  if(md.overrides&&md.overrides[cat])delete md.overrides[cat];
  costSave();_renderCostModal(md);
}

function costEditExtra(month,idx,field,val){
  const md=DB.cost.find(x=>x.month===month);if(!md||!md.extra||!md.extra[idx])return;
  md.extra[idx][field]=field==='label'?val:(parseInt(val)||0);
  costSave();_costRefreshTTL(md);
}

function costAddExtra(month){
  const label=prompt('내역 (예: 안유빈님_릴스/도트)');if(!label)return;
  const vatExStr=prompt('금액 VAT- (숫자만)');if(!vatExStr)return;
  const vatEx=parseInt(vatExStr.replace(/,/g,''));if(isNaN(vatEx))return;
  const vatIncStr=prompt('금액 VAT+');if(!vatIncStr)return;
  const vatInc=parseInt(vatIncStr.replace(/,/g,''));if(isNaN(vatInc))return;
  const md=DB.cost.find(x=>x.month===month);if(!md)return;
  if(!md.extra)md.extra=[];
  md.extra.push({label,vatEx,vatInc});
  costSave();_renderCostModal(md);
}

function costDelExtra(month,idx){
  const md=DB.cost.find(x=>x.month===month);if(!md||!md.extra)return;
  md.extra.splice(idx,1);costSave();_renderCostModal(md);
}

function costAssignCat(month,idx,cat){
  const md=DB.cost.find(x=>x.month===month);if(!md)return;
  const u=md.uncat[idx];
  md.rows.push({memo:u.memo,cat,qty:u.qty,cost:u.cost});
  md.uncat.splice(idx,1);
  costSave();_renderCostModal(md);
}

function costAddMonth(){
  const preset=window._costPresetMonth||null;
  const m=preset||prompt('월 입력 (예: 2026-06)');

  if(!m||!/^\d{4}-\d{2}$/.test(m)){if(m)toast('형식: 2026-06');return;}
  if(!DB.cost)DB.cost=[];
  if(DB.cost.find(x=>x.month===m)){toast('이미 있는 월이에요');costOpenMonth(m);return;}
  DB.cost.push({month:m,rows:[],extra:[],uncat:[],overrides:{},people:0});
  costSave();toast(`${m} 추가됨`);
  _costCalY=parseInt(m.slice(0,4));
  pgCost();costOpenMonth(m);
}

function costParseXlsx(input,month){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const raw=XLSX.utils.sheet_to_json(ws,{header:1});
      const dataRows=raw.slice(2).filter(r=>{
        const qty=parseFloat(r[6]),cost=parseFloat(r[8]);
        const name=String(r[5]||'');
        return !isNaN(qty)&&!isNaN(cost)&&cost>0&&!/계$|합계/.test(name);
      });
      const byMemo={};
      dataRows.forEach(r=>{
        const memo=String(r[10]||'');
        if(!byMemo[memo])byMemo[memo]={type:String(r[3]||''),qty:0,cost:0};
        byMemo[memo].qty+=parseFloat(r[6]);
        byMemo[memo].cost+=parseFloat(r[6])*parseFloat(r[8]);
      });
      const rows=[],uncat=[];
      Object.entries(byMemo).forEach(([memo,d])=>{
        let cat=null;
        for(const cc of COST_AUTO_CATS){if(cc.fn(d.type,memo)){cat=cc.key;break;}}
        if(cat)rows.push({memo,cat,qty:d.qty,cost:d.cost});
        else uncat.push({memo,qty:d.qty,cost:d.cost});
      });
      const md=DB.cost.find(x=>x.month===month);
      if(md){md.rows=rows;md.uncat=uncat;md.overrides={};costSave();toast('업로드 완료!');_renderCostModal(md);}
    }catch(err){toast('파일 오류: '+err.message);}
  };
  reader.readAsArrayBuffer(file);
}

function pgCampaign(){
  // 서브탭 데이터
  const types=[...new Set(DB.campaigns.map(c=>c.type))];
  // zvzo/브랜더진 탭은 별도 처리하므로 초기화에서 제외
  const isCollabTab=cur.campType==='__zvzo'||cur.campType==='__branderz';
  if(!isCollabTab&&!types.includes(cur.campType)&&types.length) cur.campType=types[0];
  const filtered=DB.campaigns.filter(c=>c.type===cur.campType).sort((a,b)=>b.round-a.round);
  const c=cur.id?DB.campaigns.find(x=>x.id===cur.id&&x.type===cur.campType):null;

  // 서브탭 HTML
  const _stabTypes=types.map(function(t){
    var on=cur.campType===t?' on':'';
    var icon=t==='릴스'?'🎬':t==='2차 활용'?'♻️':'📌';
    var cnt=DB.campaigns.filter(function(c){return c.type===t;}).length;
    return '<button class="stab'+on+'" data-type="'+t+'" onclick="campSubTab(this.dataset.type)">'+icon+' '+t+'<span class="camp-count">'+cnt+'</span></button>'
      +'<button data-type="'+t+'" onclick="renameCampType(this.dataset.type)" style="padding:2px 4px;font-size:10px;border:none;background:none;cursor:pointer;color:#bbb" title="이름 수정">✏️</button>'
      +'<button data-type="'+t+'" onclick="deleteCampType(this.dataset.type)" style="padding:2px 4px;font-size:10px;border:none;background:none;cursor:pointer;color:#bbb" title="삭제">✕</button>';
  }).join('');
  var _zvzoOn=cur.campType==='__zvzo'?' on':'';
  var _branOn=cur.campType==='__branderz'?' on':'';
  const subHtml='<div class="stab-wrap">'+_stabTypes
    +'<button class="stab'+_zvzoOn+'" data-type="__zvzo" onclick="campSubTab(this.dataset.type)">🔗 zvzo 협업</button>'
    +'<button data-brand="zvzo" onclick="renameCollab(this.dataset.brand)" style="padding:2px 4px;font-size:10px;border:none;background:none;cursor:pointer;color:#bbb" title="이름 수정">✏️</button>'
    +'<button data-brand="zvzo" onclick="deleteCollab(this.dataset.brand)" style="padding:2px 4px;font-size:10px;border:none;background:none;cursor:pointer;color:#bbb" title="삭제">✕</button>'
    +'<button class="stab'+_branOn+'" data-type="__branderz" onclick="campSubTab(this.dataset.type)">🏷 브랜더진 협업</button>'
    +'<button data-brand="브랜더진" onclick="renameCollab(this.dataset.brand)" style="padding:2px 4px;font-size:10px;border:none;background:none;cursor:pointer;color:#bbb" title="이름 수정">✏️</button>'
    +'<button data-brand="브랜더진" onclick="deleteCollab(this.dataset.brand)" style="padding:2px 4px;font-size:10px;border:none;background:none;cursor:pointer;color:#bbb" title="삭제">✕</button>'
    +'<button class="stab-new" onclick="openNewCampType()">＋ 새 유형</button>'
    +'</div>';

  // 협업 탭 분기
  if(cur.campType==='__zvzo'||cur.campType==='__branderz'){
    pgCollabTab(cur.campType==='__zvzo'?'zvzo':'브랜더진', subHtml);
    return;
  }

  if(!c){
    // 목록 화면
    const totalP=filtered.reduce((a,c)=>a+c.people.length,0);
    const totalF=filtered.flatMap(c=>c.people).reduce((a,p)=>a+(p.followers||0),0);
    const totalFee=filtered.flatMap(c=>c.people).reduce((a,p)=>{const n=parseInt((p.fee||'').replace(/[^0-9]/g,''));return a+(n||0);},0);
    document.getElementById('nav-act').innerHTML=`<button class="btn pri" onclick="openAddCampRound()">＋ 새 ${cur.campType} 차수</button>`;
    document.getElementById('page').innerHTML=`${subHtml}
    <div class="stats">
      <div class="sc"><div class="sc-l">총 차수</div><div class="sc-n">${filtered.length}<small>차</small></div></div>
      <div class="sc"><div class="sc-l">총 인원</div><div class="sc-n">${totalP}<small>명</small></div></div>
      <div class="sc"><div class="sc-l">팔로워 합계</div><div class="sc-n">${(totalF/10000).toFixed(1)}<small>만</small></div></div>
      <div class="sc"><div class="sc-l">${cur.campType==='릴스'?'총 비용':'배송지 확보'}</div><div class="sc-n">${cur.campType==='릴스'?totalFee+'<small>만원</small>':filtered.flatMap(c=>c.people).filter(p=>p.address).length+'<small>명</small>'}</div></div>
    </div>
    <div class="tw">
      <div class="tw-h"><h3>${cur.campType==='릴스'?'🎬':'♻️'} ${cur.campType} 캠페인</h3><span class="sub">${filtered.length}차 · 총 ${totalP}명</span></div>
      <div class="tsc"><table>
        <thead><tr><th>차수</th><th>날짜</th><th>발송월</th><th>업로드월</th><th>인원</th><th>팔로워</th><th>${cur.campType==='릴스'?'비용':'배송지 확보'}</th><th></th></tr></thead>
        <tbody>${filtered.length===0?`<tr><td colspan="6" class="nodata">차수를 추가해주세요</td></tr>`:
          filtered.map(c=>{
            const fee=c.people.reduce((a,p)=>{const n=parseInt((p.fee||'').replace(/[^0-9]/g,''));return a+(n||0);},0);
            const f=c.people.reduce((a,p)=>a+(p.followers||0),0);
            const sendDates=c.people.map(p=>p.sendDate).filter(Boolean);
            const uploadDates=c.people.map(p=>p.uploadDate).filter(Boolean);
            const sendMonths=[...new Set(sendDates.map(d=>d.slice(0,7)))].join(', ')||'-';
            const uploadMonths=[...new Set(uploadDates.map(d=>d.slice(0,7)))].join(', ')||'-';

              <td><input type="number" value="${c.round}" min="1" style="width:48px;padding:4px 7px;border-radius:6px;border:1px solid #e8e8e8;font-size:13px;font-weight:700;font-family:inherit" onchange="updCRound('${c.id}',this.value)"><span style="font-size:12px;color:#bbb">차</span></td>
              <td><input type="date" value="${c.date}" style="padding:4px 8px;border-radius:6px;border:1px solid #e8e8e8;font-size:12px;font-family:inherit" onchange="updCDate('${c.id}',this.value)"></td>

              <td><span style="font-size:11px;color:#3B82F6">${uploadMonths}</span></td>
              <td>${c.people.length}명</td>
              <td>${(f/10000).toFixed(1)}만</td>
              <td>${cur.campType==='릴스'?fee+'만원':c.people.filter(p=>p.address).length+'명'}</td>
              <td style="white-space:nowrap">
                <button class="btn sm" onclick="selC('${c.id}')">열기 →</button>
                <button class="btn sm dan" onclick="delC('${c.id}')">🗑</button>
              </td>
            </tr>`;}).join('')}
        </tbody>
      </table></div>
    </div>`;
    return;
  }

function saveExpTitle(id){
  const rep=DB.exposure.find(r=>r.id===id);
  rep.title=g('exp-title');
  rep.dateStart=g('exp-date-start');
  rep.dateEnd=g('exp-date-end');
  save();renderSB();renderPage();cm();toast('수정됨');
}
function renderExpText(text){
  if(!text) return '<span style="color:#bbb">내용을 입력하면 여기에 보여요</span>';
  return text.split('\n').map(line=>{
    if(!line.trim()) return '<div style="height:8px"></div>';
    // -로 시작 = 섹션 헤더
    if(/^-[^-\s]/.test(line.trim())){
      const title=line.trim().slice(1).trim();
      return `<div style="margin-top:16px;margin-bottom:6px;padding:6px 12px;background:#f0faf4;border-left:3px solid #52B788;border-radius:0 6px 6px 0;font-weight:700;color:#1D4E3A;font-size:13px">${e(title)}</div>`;
    }
    // > 로 시작 = 하위 항목
    if(/^\s*>/.test(line)){
      const content=line.trim().replace(/^>\s*/,'');
      return `<div style="padding:2px 12px 2px 24px;color:#444;font-size:12px;display:flex;gap:6px"><span style="color:#52B788;flex-shrink:0">•</span><span>${e(content)}</span></div>`;
    }
    // 일반 항목
    return `<div style="padding:2px 12px;color:#333;font-size:13px">${e(line)}</div>`;
  }).join('');
}
function renderExpPreview(){
  const val=document.getElementById('exp-editor')?.value||'';
  const preview=document.getElementById('exp-preview');
  if(preview) preview.innerHTML=renderExpText(val);
}
function saveExpContent(repId){
  const rep=DB.exposure.find(r=>r.id===repId);
  const val=document.getElementById('exp-editor')?.value||'';
  rep.content=val;
  cur.expEditing=null;
  save();renderPage();toast('저장됨 ✅');
}

function executeMoveP(wid){
  const selected=[...document.querySelectorAll('.move-chk:checked')].map(c=>c.value);

  const targetId=document.getElementById('move-target').value;
  const w=DB.weekly.find(x=>x.id===wid);
  const people=w.people.filter(p=>selected.includes(p.id));
  let target;
  if(targetId==='__new__'){
    const newDate=document.getElementById('move-new-date-input').value;
    const maxRound=Math.max(0,...DB.weekly.map(x=>x.round));
    target={id:'w'+uid(),round:maxRound+1,date:newDate,people:[]};
    DB.weekly.push(target);
  } else {
    target=DB.weekly.find(x=>x.id===targetId);
  }
  // 이동
  people.forEach(p=>target.people.push({...p,id:'p'+uid()}));
  w.people=w.people.filter(p=>!selected.includes(p.id));

  // 탭이 있는 줄 기준으로 행 분리 (셀 안의 줄바꿈 처리)
  // 엑셀 복사 형식 파싱: 따옴표로 감싸진 셀 내 줄바꿈 처리
  const rows = [];
  // 따옴표 안의 줄바꿈을 공백으로 치환 후 행 분리
  const normalized = raw.replace(/"([^"]*)"/g, (match, p1) => '"' + p1.replace(/\n/g, ' ').replace(/\t/g, ' ') + '"');
  normalized.split('\n').forEach(line => {
    if (!line.trim()) return;
    // 따옴표 제거
    const cleaned = line.replace(/"([^"]*)"/g, (m, p1) => p1.trim());
    rows.push(cleaned);
  });
  _parsed=[];
  let html=`<div style="margin-top:12px;border-radius:7px;overflow:hidden;border:1px solid #e8e8e8">
    <div style="display:grid;grid-template-columns:1.2fr 1.4fr .7fr 1.2fr .8fr;background:#f9f9f9;font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.04em">

    </div>`;
  rows.forEach((line,i)=>{
    let cols=line.split('\t');
    if(cols.length<2) cols=line.split(/\s{2,}/);
    const handle=(cols[0]||'').trim().replace(/\s+/g,' '),url=(cols[1]||'').trim();
    const followers=parseInt((cols[2]||'').replace(/[,\s]/g,''))||0;
    const product=(cols[3]||'').trim(),contact=(cols[4]||'').trim();
    const address=(cols[5]||'').trim(),note=(cols[6]||'').trim();

      <div style="padding:4px 6px">${inp('handle',handle,'활동명')}</div>
      <div style="padding:4px 6px">${inp('url',url,'URL')}</div>
      <div style="padding:4px 6px">${inp('followers',followers?String(followers):'','팔로워')}</div>
      <div style="padding:4px 6px">${inp('product',product,'제품')}</div>
      <div style="padding:4px 6px">${inp('contact',contact,'연락처')}</div>
    </div>`;

    var statusColor=isActive?'#065F46':isEnd?'#9CA3AF':'#3730A3';

function getMonthRound(wid){
  const w=DB.weekly.find(x=>x.id===wid);if(!w)return w?.round;
  const ym=w.date.slice(0,7);
  const sameMonth=[...DB.weekly].filter(x=>x.date.slice(0,7)===ym).sort((a,b)=>a.round-b.round);
  const idx=sameMonth.findIndex(x=>x.id===wid);
  const mon=parseInt(ym.slice(5))+'월';
  return `${mon} ${idx+1}차`;
}

function expW(wid){
  const w=DB.weekly.find(x=>x.id===wid);if(!w)return;
  const wb=XLSX.utils.book_new();
  const totalQty=w.people.reduce((a,p)=>a+(p.products||[p.product,p.product2].filter(Boolean)).length,0);
  const rows=[
    [`이번 주 시딩 리스트  |  ${w.date}  (${w.round}차)`,'','','','','','',''],
    ['','','','','','','',''],
    ['No. / 활동명','수취인','채널 URL','주소','컨택 포인트','제품','수량','']
  ];
  w.people.forEach(p=>{
    const name=(p.realname||'').trim()||p.handle.split('(')[0].replace(/-/g,'').trim();
    const prods=(p.products||[p.product,p.product2].filter(Boolean));
    rows.push([p.handle,name,p.url||'',p.address||'',p.contact||'',prods.join(' / '),prods.length,'']);
  });
  rows.push([`  총 ${w.people.length}명  |  발송 제품 ${totalQty}개`,'','','','','','',totalQty]);
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:7}},{s:{r:1,c:0},e:{r:1,c:7}},{s:{r:rows.length-1,c:0},e:{r:rows.length-1,c:6}}];
  ws['!cols']=[{wch:16},{wch:12},{wch:38},{wch:46},{wch:30},{wch:34},{wch:18},{wch:8}];
  XLSX.utils.book_append_sheet(wb,ws,'주간시딩리스트');
  XLSX.writeFile(wb,`주간_시딩_리스트_${w.round}차.xlsx`);
  toast('주간 엑셀 다운로드 완료');
}

function expM(mid){
  const m=DB.monthly.find(x=>x.id===mid);if(!m)return;
  const lbl=m.month.slice(0,4)+'년 '+parseInt(m.month.slice(5))+'월';
  const linked=DB.weekly.filter(w=>m.weekIds.includes(w.id)).sort((a,b)=>a.round-b.round);
  const total=linked.reduce((a,w)=>a+w.people.length,0);
  const wb=XLSX.utils.book_new();
  const rows=[
    [`${lbl} 배송 리스트  |  ${m.note}`,'','','','','','',''],
    ['','','','','','','',''],
    ['ID','주력 채널 계정','구독자/팔로워','제안상품','컨택포인트','진행유형','진행이력','비고']
  ];
  const merges=[{s:{r:0,c:0},e:{r:0,c:7}}];
  let r=3;
  linked.forEach(w=>{
    rows.push([`  ▸ ${w.round}차 (${w.date})  —  ${w.people.length}명`,'','','','','','','']);
    merges.push({s:{r,c:0},e:{r,c:7}});
    r++;
    w.people.forEach(p=>{
      rows.push([p.handle,p.url||'',p.followers||'',(p.products||[p.product,p.product2].filter(Boolean)).join(' / ')||'',p.contact||'',p.type||'',p.note||'','']);
      r++;
    });
  });
  rows.push([`  총 ${total}명`,'','','','','','','']);
  merges.push({s:{r,c:0},e:{r,c:7}});
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!merges']=merges;
  ws['!cols']=[{wch:32},{wch:44},{wch:14},{wch:38},{wch:28},{wch:14},{wch:36},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws,lbl);
  XLSX.writeFile(wb,`월간_시딩_리스트_${m.month}.xlsx`);
  toast('월간 엑셀 다운로드 완료');
}

  const isReels=c.type==='릴스';
  const rows=[
    [`${c.name} ${c.round}차  |  ${c.date}`,'','','','','','',''],
    ['','','','','','','',''],
    isReels?['#','활동명','채널 URL','팔로워','제품','컨택포인트','배송지','비용','특이사항']:
            ['#','활동명','채널 URL','팔로워','제품','컨택포인트','배송지','비고']
  ];
  c.people.forEach((p,i)=>rows.push(
    isReels?[i+1,p.handle,p.url||'',p.followers||'',(p.products||(p.product?[p.product]:[])).join(' / ')||'',p.contact||'',p.address||'',p.fee||'',p.note||'']:
            [i+1,p.handle,p.url||'',p.followers||'',(p.products||(p.product?[p.product]:[])).join(' / ')||'',p.contact||'',p.address||'',p.note||'']
  ));
  const fee=isReels?c.people.reduce((a,p)=>{const n=parseInt((p.fee||'').replace(/[^0-9]/g,''));return a+(n||0);},0):0;
  rows.push([`  총 ${c.people.length}명${isReels?' · 합계 '+fee+'만원':''}` ,'','','','','','','']);
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=isReels?[{wch:4},{wch:20},{wch:36},{wch:10},{wch:36},{wch:28},{wch:36},{wch:10},{wch:28}]:
                      [{wch:4},{wch:20},{wch:36},{wch:10},{wch:36},{wch:28},{wch:36},{wch:28}];
  XLSX.utils.book_append_sheet(wb,ws,c.name+c.round+'차');
  XLSX.writeFile(wb,`${c.name}_${c.round}차.xlsx`);
  toast('엑셀 다운로드 완료');
}

function expHistory(){
  const map={};
  DB.weekly.forEach(w=>w.people.forEach(p=>{
    const k=normH(p.handle);
    if(!map[k])map[k]={handle:p.handle,followers:p.followers,seedings:[],camps:[]};
    map[k].seedings.push({round:w.round,products:p.products||(p.product?[p.product]:[])});
  }));
  DB.campaigns.forEach(c=>c.people.forEach(p=>{
    const k=normH(p.handle);
    if(!map[k])map[k]={handle:p.handle,followers:p.followers,seedings:[],camps:[]};
    map[k].camps.push({name:c.name,type:c.type,round:c.round,product:p.product,fee:p.fee});
  }));
  const entries=Object.values(map).sort((a,b)=>(b.camps.length>0?1:0)-(a.camps.length>0?1:0));
  const wb=XLSX.utils.book_new();
  const rows1=[['인물별 시딩·캠페인 진행 이력','','','','','','',''],['','','','','','','',''],
    ['#','활동명','팔로워','상태','시딩 차수','시딩 제품','캠페인','비용']];
  entries.forEach((x,i)=>rows1.push([i+1,x.handle,x.followers||'',
    x.camps.length>0&&x.seedings.length>0?'시딩+캠페인':x.camps.length>0?'캠페인만':'시딩',
    x.seedings.map(s=>s.monthRound||s.round+'차').join(', ')||'-',
    [...new Set(x.seedings.flatMap(s=>s.products||(s.product?[s.product]:[])).filter(Boolean))].join(' / ')||'-',
    x.camps.map(c=>c.name+' '+c.round+'차').join(', ')||'-',
    x.camps.map(c=>c.fee).filter(Boolean).join(', ')||'-']));
  const ws1=XLSX.utils.aoa_to_sheet(rows1);
  ws1['!cols']=[{wch:4},{wch:20},{wch:10},{wch:12},{wch:14},{wch:36},{wch:24},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws1,'인물별 진행이력');
  const dual=entries.filter(x=>x.camps.length>0&&x.seedings.length>0);
  const rows2=[['시딩 → 캠페인 전환 인원','','','',''],['','','','',''],['활동명','팔로워','시딩 차수','캠페인','비용']];
  dual.forEach(x=>rows2.push([x.handle,x.followers||'',x.seedings.map(s=>s.round+'차').join(', '),x.camps.map(c=>c.name+' '+c.round+'차').join(', '),x.camps.map(c=>c.fee).filter(Boolean).join(', ')||'-']));
  const ws2=XLSX.utils.aoa_to_sheet(rows2);
  ws2['!cols']=[{wch:20},{wch:10},{wch:14},{wch:24},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws2,'시딩→캠페인 전환');
  XLSX.writeFile(wb,`시딩_캠페인_진행이력_${today()}.xlsx`);
  toast('통합 엑셀 다운로드 완료');
}

function backupData(){
  const data=JSON.stringify(DB,null,2);
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const date=new Date().toISOString().slice(0,10);
  a.href=url;
  a.download=`시딩매니저_백업_${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('백업 파일 저장 완료 💾');
}

function restoreData(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      // 유효성 확인
      if(!data.weekly||!data.monthly||!data.campaigns){
        alert('올바른 백업 파일이 아닙니다.');return;
      }
      if(!confirm(`백업 파일을 불러올까요?\n현재 데이터는 백업 데이터로 교체됩니다.\n\n주간: ${data.weekly.length}차 / 캠페인: ${data.campaigns.length}개`))return;
      if(!data.cost) data.cost=[];
      if(!data.collabs) data.collabs=[];
      DB=data;
      save();
      cur={tab:'dash',campType:'릴스',id:null};
      renderSB();
      pgDash();
      toast('백업 데이터 복원 완료 ✅');
    }catch(err){
      alert('파일을 읽는 중 오류가 발생했습니다.');
    }
  };
  reader.readAsText(file);
  input.value=''; // 같은 파일 다시 선택 가능하도록 초기화
}

// ══════════════════════════════

function resetData(){
  if(!confirm('⚠️ 모든 데이터를 기본값(엑셀 원본)으로 초기화할까요?\n직접 추가/수정한 내용은 모두 사라집니다.')) return;
  try{localStorage.removeItem('sdmgr14');}catch(e){}
  seed();

  cur={tab:'dash',campType:'릴스',id:null};
  renderSB();
  pgDash();
  toast('데이터 초기화 완료 ✅');
}

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBGH-8P0Fh2LajoYUSizWKU8ZVyozi3Mo4",
  authDomain: "seeding-manager-fc674.firebaseapp.com",
  projectId: "seeding-manager-fc674",
  storageBucket: "seeding-manager-fc674.firebasestorage.app",
  messagingSenderId: "591887881245",
  appId: "1:591887881245:web:3b55f8ae0325ee6e2322f4",
};

const fbApp = initializeApp(firebaseConfig);
const fsDB = getFirestore(fbApp);
const DB_DOC = doc(fsDB, "seeding", "main");

// undefined/null 제거
function clean(obj) {
  if (Array.isArray(obj)) return obj.map(clean);
  if (obj && typeof obj === 'object') {
    const o = {};
    for (const k of Object.keys(obj)) {
      const v = obj[k];
      if (v !== undefined && v !== null) o[k] = clean(v);
      else o[k] = '';
    }
    return o;
  }
  return obj ?? '';
}

window._fbSave = async function() {
  try {
    await setDoc(DB_DOC, clean(DB));
  } catch(e) {
    console.error('저장 실패:', e);
  }
};

// 로드
try {
  const snap = await getDoc(DB_DOC);
  if (snap.exists()) {
    const data = snap.data();
    if (data.weekly && data.weekly.length > 0) {
      DB.weekly = data.weekly;
      DB.monthly = data.monthly;
      DB.campaigns = data.campaigns;
      DB.exposure = data.exposure || [];
    } else {
      seed();
      await window._fbSave();
    }
  } else {
    seed();
    await window._fbSave();
  }
} catch(e) {
  console.warn('Firebase 연결 실패:', e);
  seed();
}

renderSB();
pgDash();

// 실시간 동기화
let saving = false;
const orig = window._fbSave;
window._fbSave = async function() {
  saving = true;
  await orig();
  setTimeout(() => saving = false, 2000);
};

onSnapshot(DB_DOC, (snap) => {
  if (saving) return;
  if (snap.exists()) {
    const data = snap.data();
    if (data.weekly) {
      DB.weekly = data.weekly;
      DB.monthly = data.monthly;
      DB.campaigns = data.campaigns;
      DB.exposure = data.exposure || [];
      DB.cost = data.cost || [];
      DB.collabs = data.collabs || [];
      renderSB();
      renderPage();
    }
  }
});
</script>
